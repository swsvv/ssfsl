project: ssfsl
dataset: miniImageNet
eval_dataset: miniImageNet
dataset_path: /path/to/dataset/miniImageNet/Ravi
save_path: /path/to/ckpt
save_freq: 10
num_epoch: 500
num_workers: 8
batch_size: 256
lr: 0.03
weight_decay: 1e-04
momentum: 0.9
encoder: ResNet18
proj:
    proj_size: 512-2048-256
    activate_fn: ReLU
pred:
    pred_size: 256-4096-256
    activate_fn: ReLU
model:
    name: NNCLR
    queue_size: 10000
    temperature: 0.1
device: ""
wandb_run_id: ""
group: "{name}_{encoder}_{dataset}"
exp_name: "{name}_{encoder}_{dataset}_{current_time}_{seed}_{word}"
